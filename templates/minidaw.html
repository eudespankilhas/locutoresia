<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniDAW - Mixagem Profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --accent-color: #ec4899;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .main-header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .daw-container {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .track-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .track-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
        }

        .track-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .track-type {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .track-type.voice {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }

        .track-type.music {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
            border: 1px solid #a855f7;
        }

        .waveform-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 80px;
            position: relative;
            overflow: hidden;
            margin: 1rem 0;
        }

        .waveform {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--primary-color) 10%, 
                var(--secondary-color) 50%, 
                var(--accent-color) 90%, 
                transparent 100%);
            opacity: 0.3;
        }

        .controls-panel {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            min-width: 60px;
        }

        .btn-daw {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-daw:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .btn-daw.btn-success {
            background: #10b981;
        }

        .btn-daw.btn-success:hover {
            background: #059669;
        }

        .btn-daw.btn-danger {
            background: #ef4444;
        }

        .btn-daw.btn-danger:hover {
            background: #dc2626;
        }

        .timeline-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .timeline-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .playback-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.1);
        }

        .timeline-ruler {
            height: 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
            margin-bottom: 1rem;
        }

        .timeline-tracks {
            min-height: 200px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s ease;
            margin: 2rem 0;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.1);
        }

        .drop-zone i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .export-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .export-options {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .format-selector {
            display: flex;
            gap: 0.5rem;
        }

        .format-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .format-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .volume-slider {
            width: 120px;
        }

        .fade-slider {
            width: 100px;
        }

        .pan-slider {
            width: 80px;
        }

        .mixing-status {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            display: none;
        }

        .mixing-status.active {
            display: block;
        }

        .progress-bar-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .track-effects {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .effect-btn {
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .effect-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .effects-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            display: none;
        }

        .effects-panel.active {
            display: block;
        }

        .effect-control {
            margin-bottom: 1rem;
        }

        .effect-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .recording {
            animation: pulse 1.5s infinite;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-secondary);
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .quick-action-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quick-action-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .quick-action-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .playback-controls-enhanced {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(30, 41, 59, 0.8);
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: scale(1.1);
        }

        .control-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .control-btn.scissor-mode {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        .zoom-controls {
            display: flex;
            gap: 0.25rem;
            align-items: center;
            background: rgba(30, 41, 59, 0.6);
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .zoom-indicator {
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: center;
            font-weight: 600;
        }

        .track-zoom-controls {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.25rem;
            background: rgba(30, 41, 59, 0.9);
            padding: 0.25rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            z-index: 10;
        }

        .track-zoom-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .track-zoom-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .project-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(30, 41, 59, 0.8);
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .vip-save-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .vip-save-btn:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
        }

        .auto-fade-indicator {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            display: none;
            z-index: 10;
        }

        .auto-fade-indicator.active {
            display: block;
        }

        @media (max-width: 768px) {
            .daw-container {
                padding: 1rem;
            }

            .controls-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .export-options {
                flex-direction: column;
            }

            .timeline-header {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-music me-2"></i>
                        MiniDAW - Mixagem Profissional
                    </h1>
                </div>
                <div class="col-md-6 text-md-end">
                    <div class="d-flex gap-2 justify-content-md-end">
                        <button class="btn btn-daw btn-sm" onclick="importFromTTS()">
                            <i class="fas fa-download me-1"></i>
                            Importar do TTS
                        </button>
                        <button class="btn btn-daw btn-success btn-sm" onclick="exportMix()">
                            <i class="fas fa-file-export me-1"></i>
                            Exportar Mix
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="daw-container">
        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="quick-action-btn" onclick="addTrack('voice')">
                <i class="fas fa-microphone me-1"></i>
                Adicionar Voz
            </button>
            <button class="quick-action-btn" onclick="addTrack('music')">
                <i class="fas fa-music me-1"></i>
                Adicionar Música
            </button>
            <button class="quick-action-btn" onclick="addTrack('effect')">
                <i class="fas fa-magic me-1"></i>
                Adicionar Efeito
            </button>
            <button class="quick-action-btn" onclick="window.open('https://app.lmnt.com/', '_blank')" title="Gerar vozes externamente no LMNT Studio">
                <i class="fas fa-microphone-alt me-1"></i>
                LMNT Studio
            </button>
            <button class="quick-action-btn" onclick="exportProject()">
                <i class="fas fa-download me-1"></i>
                Exportar
            </button>
            <button class="quick-action-btn" onclick="toggleScissorMode()" id="scissorBtn">
                <i class="fas fa-cut me-1"></i>
                Tesoura
            </button>
            <button class="quick-action-btn" onclick="normalizeVolumes()">
                <i class="fas fa-sliders-h me-1"></i>
                Normalizar
            </button>
            <button class="quick-action-btn" onclick="applyAutoFade()">
                <i class="fas fa-wave-square me-1"></i>
                Auto Fade
            </button>
            <button class="quick-action-btn" onclick="clearAllTracks()">
                <i class="fas fa-trash me-1"></i>
                Limpar
            </button>
        </div>

        <!-- Timeline -->
        <div class="timeline-container">
            <div class="timeline-header">
                <div class="playback-controls-enhanced">
                    <button class="control-btn" onclick="togglePlayback()" title="Play/Pause (Espaço)">
                        <i class="fas fa-play" id="playIcon"></i>
                    </button>
                    <button class="control-btn" onclick="stopPlayback()" title="Stop (S)">
                        <i class="fas fa-stop"></i>
                    </button>
                    <div class="control-group">
                        <span class="control-label">Tempo:</span>
                        <span id="currentTime">0:00</span>
                    </div>
                    <div class="control-group">
                        <span class="control-label">Duração:</span>
                        <span id="totalDuration">0:00</span>
                    </div>
                </div>
                <div class="zoom-controls">
                    <button class="control-btn" onclick="zoomIn()" title="Zoom In (+)">
                        <i class="fas fa-search-plus"></i>
                    </button>
                    <span class="zoom-indicator" id="zoomIndicator">100%</span>
                    <button class="control-btn" onclick="zoomOut()" title="Zoom Out (-)">
                        <i class="fas fa-search-minus"></i>
                    </button>
                </div>
                <div class="project-controls">
                    <button class="vip-save-btn" onclick="saveVipProject()" title="Salvar Projeto VIP">
                        <i class="fas fa-star"></i>
                        Salvar VIP
                    </button>
                    <button class="control-btn" onclick="loadVipProject()" title="Carregar Projeto VIP">
                        <i class="fas fa-folder-open"></i>
                    </button>
                </div>
            </div>
            <div class="timeline-ruler"></div>
            <div class="timeline-tracks" id="timelineTracks">
                <!-- Tracks will be added here -->
            </div>
        </div>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
            <i class="fas fa-cloud-upload-alt"></i>
            <h4>Arraste arquivos de áudio aqui</h4>
            <p class="text-muted">MP3, WAV, OGG, M4A suportados</p>
            <button class="btn btn-daw mt-3" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-folder-open me-1"></i>
                Escolher Arquivos
            </button>
            <input type="file" id="fileInput" multiple accept="audio/*" style="display: none;" onchange="handleFileSelect(event)">
        </div>

        <!-- Tracks Container -->
        <div id="tracksContainer">
            <!-- Tracks will be added here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
            <i class="fas fa-music"></i>
            <h3>Nenhuma faixa adicionada</h3>
            <p>Adicione vozes e trilhas para começar a mixagem</p>
            <button class="btn btn-daw mt-3" onclick="addTrack('voice')">
                <i class="fas fa-plus me-1"></i>
                Adicionar Primeira Faixa
            </button>
        </div>

        <!-- Export Panel -->
        <div class="export-panel">
            <h4 class="mb-3">
                <i class="fas fa-file-export me-2"></i>
                Exportar Mix Final
            </h4>
            <div class="export-options">
                <div class="format-selector">
                    <button class="format-btn active" onclick="setFormat('wav')">WAV</button>
                    <button class="format-btn" onclick="setFormat('mp3')">MP3</button>
                </div>
                <div class="control-group" id="mp3BitrateGroup" style="display: none;">
                    <span class="control-label">Bitrate:</span>
                    <select class="form-select form-select-sm" id="mp3Bitrate">
                        <option value="128">128 kbps</option>
                        <option value="192" selected>192 kbps</option>
                        <option value="320">320 kbps</option>
                    </select>
                </div>
                <button class="btn btn-daw btn-success" onclick="exportMix()">
                    <i class="fas fa-download me-1"></i>
                    Exportar
                </button>
            </div>
        </div>

        <!-- Mixing Status -->
        <div class="mixing-status" id="mixingStatus">
            <h5 class="mb-2">
                <i class="fas fa-cog fa-spin me-2"></i>
                Processando Mix...
            </h5>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <p class="mb-0 text-muted" id="mixingStatusText">Preparando faixas...</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js"></script>
    <script src="/static/minidaw.js?v=4"></script>
    
    <!-- Script para carregar áudio enviado da página principal -->
    <script>
        // Verifica se há áudio pendente do localStorage
        window.addEventListener('load', function() {
            setTimeout(function() {
                const pendingAudio = localStorage.getItem('minidaw_pending_audio');
                const pendingFilename = localStorage.getItem('minidaw_pending_filename');
                const pendingTimestamp = localStorage.getItem('minidaw_pending_timestamp');
                
                if (pendingAudio && minidaw) {
                    console.log('Carregando áudio pendente do localStorage...');
                    
                    // Converte base64 para blob
                    fetch(pendingAudio)
                        .then(res => res.blob())
                        .then(blob => {
                            // Cria arquivo e carrega
                            const file = new File([blob], pendingFilename || 'audio_gerado.wav', { type: 'audio/wav' });
                            
                            // Adiciona track e carrega áudio
                            minidaw.addTrack('voice');
                            const trackId = minidaw.tracks[minidaw.tracks.length - 1].id;
                            
                            return minidaw.loadAudioFile(file, trackId).then(() => {
                                // Atualiza nome
                                const track = minidaw.tracks.find(t => t.id === trackId);
                                if (track) {
                                    track.name = (pendingFilename || 'audio_gerado').replace('.wav', '');
                                    minidaw.updateTrackUI(track);
                                }
                                
                                minidaw.showNotification('Áudio recebido da página principal!', 'success');
                                
                                // Limpa localStorage
                                localStorage.removeItem('minidaw_pending_audio');
                                localStorage.removeItem('minidaw_pending_filename');
                                localStorage.removeItem('minidaw_pending_timestamp');
                            });
                        })
                        .catch(error => {
                            console.error('Erro ao carregar áudio pendente:', error);
                            minidaw.showNotification('Erro ao carregar áudio enviado', 'error');
                        });
                }
            }, 1000); // Aguarda 1s para MiniDAW inicializar
        });
    </script>
</body>
</html>

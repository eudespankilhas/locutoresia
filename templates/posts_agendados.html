<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts Agendados - Locutores IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--text-primary) !important;
        }

        .nav-link {
            color: var(--text-secondary) !important;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--accent-purple) !important;
        }

        .nav-link.active {
            color: var(--accent-purple) !important;
        }

        .container-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .posts-container {
            display: grid;
            gap: 1.5rem;
        }

        .post-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.2);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .post-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .post-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-post {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .badge-story {
            background: rgba(236, 72, 153, 0.2);
            color: #f472b6;
        }

        .badge-reel {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .post-content {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .post-time {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .post-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .engagement-score {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .back-button {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-purple);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .container-main {
                padding: 1rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .post-header {
                flex-direction: column;
                gap: 1rem;
            }

            .post-footer {
                flex-direction: column;
                gap: 1rem;
                align-items: start;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="fas fa-microphone-alt text-purple-400"></i>
                <span>Locutores IA</span>
                <span class="badge bg-purple-500">Posts</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPosts">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarPosts">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="/noticias"><i class="fas fa-newspaper me-1"></i>Notícias</a></li>
                    <li class="nav-item"><a class="nav-link" href="/social-posts"><i class="fas fa-share-alt me-1"></i>Posts Sociais</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ai-dashboard"><i class="fas fa-robot me-1"></i>IA Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/posts-agendados"><i class="fas fa-calendar me-1"></i>Posts Agendados</a></li>
                    <li class="nav-item"><a class="nav-link" href="/agendamento"><i class="fas fa-clock me-1"></i>Agendamento</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BACK BUTTON -->
    <a href="/ai-dashboard" class="back-button">
        <i class="fas fa-arrow-left me-2"></i>Voltar
    </a>

    <!-- MAIN CONTENT -->
    <div class="container-main">
        <div class="page-header">
            <h1 class="page-title">Posts Agendados</h1>
            <p class="text-secondary">Visualize e gerencie todos os seus posts agendados</p>
        </div>

        <!-- STATS GRID -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-posts">-</div>
                <div class="stat-label">Total de Posts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="scheduled-posts">-</div>
                <div class="stat-label">Agendados</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="published-posts">-</div>
                <div class="stat-label">Publicados</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avg-engagement">-</div>
                <div class="stat-label">Engajamento Médio</div>
            </div>
        </div>

        <!-- POSTS CONTAINER -->
        <div class="posts-container" id="posts-container">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin fa-3x mb-3"></i>
                <p class="text-secondary">Carregando posts agendados...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadScheduledPosts();
        });

        async function loadScheduledPosts() {
            try {
                const response = await fetch('https://locutores-ia-cyan.vercel.app/api/scheduled-posts');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const responseText = await response.text();
                
                if (!responseText || responseText.trim() === '') {
                    throw new Error('Resposta vazia do servidor');
                }

                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (jsonError) {
                    console.error('Erro no parsing JSON:', jsonError);
                    console.error('Resposta recebida:', responseText);
                    throw new Error('Resposta inválida do servidor. Tente novamente.');
                }

                if (result.success) {
                    displayPosts(result.data);
                } else {
                    throw new Error(result.error || 'Erro ao carregar posts');
                }
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro ao carregar posts: ' + error.message);
            }
        }

        function displayPosts(data) {
            // Update stats
            document.getElementById('total-posts').textContent = data.total;
            document.getElementById('scheduled-posts').textContent = data.scheduled;
            document.getElementById('published-posts').textContent = data.published;
            
            // Calculate average engagement
            const avgEngagement = data.posts.length > 0 
                ? Math.round(data.posts.reduce((sum, post) => sum + post.engagement_score, 0) / data.posts.length)
                : 0;
            document.getElementById('avg-engagement').textContent = avgEngagement + '%';

            // Display posts
            const container = document.getElementById('posts-container');
            
            if (data.posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-times"></i>
                        <h3>Nenhum post agendado</h3>
                        <p>Vá para o AI Dashboard para gerar e agendar seus primeiros posts!</p>
                        <a href="/ai-dashboard" class="btn btn-primary mt-3">
                            <i class="fas fa-robot me-2"></i>Gerar Posts com IA
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.posts.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div>
                            <h3 class="post-title">${post.title}</h3>
                            <div class="post-meta">
                                <span class="post-badge badge-${post.type}">${post.type.toUpperCase()}</span>
                                <span class="post-badge" style="background: rgba(139, 92, 246, 0.2); color: #a78bfa;">
                                    <i class="fab fa-instagram me-1"></i>${post.platform}
                                </span>
                                <span class="engagement-score">
                                    <i class="fas fa-chart-line me-1"></i>${post.engagement_score}%
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="post-content">
                        ${post.content}
                    </div>
                    
                    <div class="post-footer">
                        <div class="post-time">
                            <i class="fas fa-clock me-2"></i>
                            <strong>Agendado para:</strong> ${formatDateTime(post.scheduled_time)}
                        </div>
                        <div class="post-actions">
                            <button class="btn-action btn-edit" onclick="editPost('${post.id}')">
                                <i class="fas fa-edit me-1"></i>Editar
                            </button>
                            <button class="btn-action btn-delete" onclick="deletePost('${post.id}')">
                                <i class="fas fa-trash me-1"></i>Excluir
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDateTime(dateTimeStr) {
            const date = new Date(dateTimeStr);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showError(message) {
            const container = document.getElementById('posts-container');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle text-warning"></i>
                    <h3>Erro ao carregar posts</h3>
                    <p>${message}</p>
                    <button class="btn btn-primary mt-3" onclick="loadScheduledPosts()">
                        <i class="fas fa-sync me-2"></i>Tentar Novamente
                    </button>
                </div>
            `;
        }

        function editPost(postId) {
            alert('Funcionalidade de edição em desenvolvimento. Post ID: ' + postId);
        }

        function deletePost(postId) {
            if (confirm('Tem certeza que deseja excluir este post?')) {
                alert('Funcionalidade de exclusão em desenvolvimento. Post ID: ' + postId);
            }
        }
    </script>
</body>
</html>

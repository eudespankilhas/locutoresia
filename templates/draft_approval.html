<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Rascunhos & Aprovação - Locutores IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .draft-card {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #6b21a8;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .draft-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(107, 33, 168, 0.3);
        }
        
        .editable-text {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        
        .editable-text:hover {
            background-color: rgba(107, 33, 168, 0.2);
        }
        
        .editable-text.editing {
            background-color: rgba(107, 33, 168, 0.3);
            border: 1px solid #6b21a8;
        }
        
        .tab-content {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .nav-tabs .nav-link {
            color: #94a3b8;
            border: 1px solid transparent;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
        }
        
        .nav-tabs .nav-link.active {
            color: white;
            background: linear-gradient(135deg, #6b21a8, #581c87);
            border-color: #6b21a8;
        }
        
        .nav-tabs .nav-link:hover {
            color: white;
            background: rgba(107, 33, 168, 0.2);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-approve {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
        }
        
        .btn-reject {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            color: white;
        }
        
        .btn-schedule {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
        }
        
        .schedule-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .schedule-modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #6b21a8;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
        }
        
        .reject-reason {
            display: none;
            margin-top: 15px;
        }
        
        .caption-suggestor {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #6b21a8;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }
        
        .caption-option {
            background: rgba(107, 33, 168, 0.1);
            border: 1px solid #6b21a8;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .copy-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .copy-btn {
            background: rgba(107, 33, 168, 0.2);
            border: 1px solid #6b21a8;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .copy-btn:hover {
            background: rgba(107, 33, 168, 0.4);
        }
        
        .media-card {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #6b21a8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }
        
        .ai-suggestor-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .ai-suggestor-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-draft {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }
        
        .status-scheduled {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }
        
        .status-approved {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }
        
        .status-rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
            min-height: 100vh;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-microphone-alt me-2"></i>Locutores IA
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/busca"><i class="fas fa-search me-1"></i>Busca</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/noticias"><i class="fas fa-newspaper me-1"></i>Notícias</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/minidaw" target="_blank"><i class="fas fa-music me-1"></i>MiniDAW</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/painel"><i class="fas fa-tachometer-alt me-1"></i>Painel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/draft_approval"><i class="fas fa-clipboard-check me-1"></i>Rascunhos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contato"><i class="fas fa-envelope me-1"></i>Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <h1><i class="fas fa-clipboard-check me-2"></i>Dashboard de Rascunhos & Aprovação</h1>
                <p class="text-muted">Gerencie rascunhos, agendamentos e aprovações de conteúdo</p>
            </div>
        </div>

        <!-- Abas -->
        <div class="row mt-4">
            <div class="col-12">
                <ul class="nav nav-tabs" id="draftTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="drafts-tab" data-bs-toggle="tab" data-bs-target="#drafts" type="button" role="tab">
                            <i class="fas fa-edit me-2"></i>Rascunhos <span class="badge bg-warning ms-1">3</span>
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="scheduled-tab" data-bs-toggle="tab" data-bs-target="#scheduled" type="button" role="tab">
                            <i class="fas fa-calendar-alt me-2"></i>Programados <span class="badge bg-info ms-1">2</span>
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="approved-tab" data-bs-toggle="tab" data-bs-target="#approved" type="button" role="tab">
                            <i class="fas fa-check-circle me-2"></i>Aprovados <span class="badge bg-success ms-1">5</span>
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="rejected-tab" data-bs-toggle="tab" data-bs-target="#rejected" type="button" role="tab">
                            <i class="fas fa-times-circle me-2"></i>Rejeitados <span class="badge bg-danger ms-1">1</span>
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="draftTabsContent">
                    <!-- Rascunhos -->
                    <div class="tab-pane fade show active" id="drafts" role="tabpanel">
                        <div id="draftsContent">
                            <!-- Cards de rascunhos serão inseridos aqui -->
                        </div>
                    </div>

                    <!-- Programados -->
                    <div class="tab-pane fade" id="scheduled" role="tabpanel">
                        <div id="scheduledContent">
                            <!-- Cards programados serão inseridos aqui -->
                        </div>
                    </div>

                    <!-- Aprovados -->
                    <div class="tab-pane fade" id="approved" role="tabpanel">
                        <div id="approvedContent">
                            <!-- Cards aprovados serão inseridos aqui -->
                        </div>
                    </div>

                    <!-- Rejeitados -->
                    <div class="tab-pane fade" id="rejected" role="tabpanel">
                        <div id="rejectedContent">
                            <!-- Cards rejeitados serão inseridos aqui -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Biblioteca de Mídia -->
        <div class="row mt-5">
            <div class="col-12">
                <h2><i class="fas fa-photo-video me-2"></i>Biblioteca de Mídia</h2>
                <div id="mediaLibrary">
                    <!-- Cards de mídia serão inseridos aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Agendamento -->
    <div class="schedule-modal" id="scheduleModal">
        <div class="schedule-modal-content">
            <h4><i class="fas fa-calendar-alt me-2"></i>Agendar Publicação</h4>
            <div class="mt-3">
                <label for="scheduleDateTime" class="form-label">Data e Hora:</label>
                <input type="datetime-local" class="form-control" id="scheduleDateTime">
            </div>
            <div class="mt-3">
                <label class="form-label">Post:</label>
                <div id="schedulePreview" class="p-3 bg-dark rounded"></div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-primary" onclick="confirmSchedule()">
                    <i class="fas fa-check me-1"></i>Confirmar Agendamento
                </button>
                <button class="btn btn-secondary" onclick="closeScheduleModal()">
                    <i class="fas fa-times me-1"></i>Cancelar
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/draft_approval.js') }}"></script>
</body>
</html>
